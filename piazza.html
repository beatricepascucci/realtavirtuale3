  <style>
    body { margin: 0; background: #000; font-family: 'Georgia', serif; }
    #hud { position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      pointer-events: none; }
    #hud-title { font-size: 0.85rem; letter-spacing: 0.2em;
      color: rgba(232,207,133,0.9); text-transform: uppercase; }
    #hud-back { pointer-events: all; text-decoration: none; font-size: 0.8rem;
      letter-spacing: 0.15em; color: rgba(232,207,133,0.8);
      border: 1px solid rgba(201,168,76,0.4); padding: 0.4rem 0.9rem;
      transition: all 0.3s; background: rgba(0,0,0,0.4); }
    #hud-back:hover { color: #e8cf85; border-color: #c9a84c; background: rgba(0,0,0,0.7); }
    #crosshair { position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%); width: 20px; height: 20px;
      pointer-events: none; z-index: 50; opacity: 0.6; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute;
      background: rgba(232,207,133,0.8); }
    #crosshair::before { width: 100%; height: 1px; top: 50%; }
    #crosshair::after  { width: 1px; height: 100%; left: 50%; }
  </style>
</head>
<body>

<script>
(function() {
  var ROOMS = {
    piazza:    { dot: [110, 165], fills: ['mm-piazza'] },
    esterno:   { dot: [64,  106], fills: ['mm-esterno'] },
    corridoio: { dot: [64,  64],  fills: ['mm-corridoio'] },
    pozzo:     { dot: [168, 64],  fills: ['mm-pozzo'] },
    cappella:  { dot: [160, 133], fills: ['mm-cappella'] },
    loggia:     { dot: [199, 23],  fills: ['mm-loggia'] },
  };

  var NEUTRAL_FILL   = '#2a2010';
  var NEUTRAL_STROKE = '#5a4820';
  var NEUTRAL_TEXT   = '#7a6840';
  var ACTIVE_FILL    = 'rgba(201,168,76,0.22)';
  var ACTIVE_STROKE  = '#c9a84c';
  var ACTIVE_TEXT    = '#e8cf85';

  var TEXT_IDS = {
    piazza:    ['mm-piazza-t'],
    esterno:   ['mm-esterno-t'],
    corridoio: ['mm-corridoio-t'],
    pozzo:     ['mm-pozzo-t1','mm-pozzo-t2'],
    cappella:  ['mm-cappella-t'],
    loggia:     ['mm-loggia-t1','mm-loggia-t2'],
  };

  function highlight(key) {
    // Reset tutto
    Object.keys(ROOMS).forEach(function(k) {
      var shapeId = 'mm-' + k;
      var el = document.getElementById(shapeId);
      if (!el) return;
      if (el.tagName === 'circle') {
        el.setAttribute('fill', NEUTRAL_FILL);
        el.setAttribute('stroke', NEUTRAL_STROKE);
      } else {
        el.setAttribute('fill', NEUTRAL_FILL);
        el.setAttribute('stroke', NEUTRAL_STROKE);
      }
      TEXT_IDS[k].forEach(function(tid) {
        var t = document.getElementById(tid);
        if (t) t.setAttribute('fill', NEUTRAL_TEXT);
      });
    });

    // Attiva stanza corrente
    var shapeId = 'mm-' + key;
    var el = document.getElementById(shapeId);
    if (el) {
      el.setAttribute('fill', ACTIVE_FILL);
      el.setAttribute('stroke', ACTIVE_STROKE);
    }
    TEXT_IDS[key].forEach(function(tid) {
      var t = document.getElementById(tid);
      if (t) t.setAttribute('fill', ACTIVE_TEXT);
    });

    // Sposta dot
    var dot = document.getElementById('mm-dot');
    var pos = ROOMS[key].dot;
    dot.setAttribute('cx', pos[0]);
    dot.setAttribute('cy', pos[1]);
  }

  // Legge la scena corrente dall'attributo data-current
  var hud = document.getElementById('minimap-hud');
  var current = hud.getAttribute('data-current') || 'piazza';
  highlight(current);
})();
</script>

        material="color: #2a2a2a; roughness: 0.4; metalness: 1.0"
      ></a-torus>

    </a-entity>
    <!-- fine totem -->

  </a-scene>

  <script>
    /* ──────────────────────────────────────────
       COMPONENTE: rotazione totem verso la camera
       (solo asse Y — il totem resta sempre dritto)
    ────────────────────────────────────────── */
    AFRAME.registerComponent('face-camera-y', {
      tick: function () {
        var camera = document.getElementById('camera');
        if (!camera) return;
        var camPos = new THREE.Vector3();
        var elPos  = new THREE.Vector3();
        camera.object3D.getWorldPosition(camPos);
        this.el.object3D.getWorldPosition(elPos);
        var angle = Math.atan2(camPos.x - elPos.x, camPos.z - elPos.z);
        this.el.object3D.rotation.y = angle;
      }
    });

    /* ──────────────────────────────────────────
       CONFIGURAZIONE TOTEM
       → Modifica SOLO questa sezione
    ────────────────────────────────────────── */
    var TOTEM_CONFIG = {
      videoId  : 'totem-video',
      audioId  : 'totem-audio',
      images   : ['#totem-img-1','#totem-img-2','#totem-img-3','#totem-img-4','#totem-img-5'],
      interval : 5000   // ms per ogni immagine
    };

    /* ──────────────────────────────────────────
       STATO INTERNO
    ────────────────────────────────────────── */
    var totemActive  = false;
    var isVideoPhase = false;
    var currentSlide = 0;
    var slideTimer   = null;

    var totemVideo   = null;
    var totemAudio   = null;
    var totemScreen  = null;
    var totemCounter = null;

    /* Inizializza dopo che la scena A-Frame è pronta */
    document.querySelector('a-scene').addEventListener('loaded', function () {
      totemVideo   = document.getElementById(TOTEM_CONFIG.videoId);
      totemAudio   = document.getElementById(TOTEM_CONFIG.audioId);
      totemScreen  = document.getElementById('totem-screen');
      totemCounter = document.getElementById('totem-counter');

      /* Quando il video drone finisce → passa automaticamente alle immagini */
      totemVideo.addEventListener('ended', function () {
        if (!totemActive) return;
        isVideoPhase = false;
        currentSlide = 0;
        showImage(currentSlide);
        updateCounter();
        startImageTimer();
      });
    });

    /* ── TOGGLE avvio/stop ── */
    function toggleTotem() {
      totemActive ? stopTotem() : startTotem();
    }

    /* ── AVVIA: prima il video drone, poi le immagini ── */
    function startTotem() {
      totemActive  = true;
      isVideoPhase = true;
      currentSlide = 0;

      /* Audio narrante (parte subito insieme al video) */
      if (totemAudio) {
        totemAudio.currentTime = 0;
        totemAudio.play().catch(function(e){
          console.warn('Audio bloccato:', e);
        });
      }

      /* Video sul totem */
      totemScreen.setAttribute('material', 'shader', 'flat');
      totemScreen.setAttribute('material', 'src', '#totem-video');
      totemVideo.currentTime = 0;
      totemVideo.play().catch(function(e){
        /* Fallback: se il video non parte, vai subito alle immagini */
        console.warn('Video bloccato, salto alle immagini:', e);
        isVideoPhase = false;
        showImage(0);
        updateCounter();
        startImageTimer();
      });

      updateCounter();
    }

    /* ── FERMA tutto e resetta ── */
    function stopTotem() {
      totemActive  = false;
      isVideoPhase = false;
      clearInterval(slideTimer);
      slideTimer = null;

      if (totemVideo) { totemVideo.pause(); totemVideo.currentTime = 0; }
      if (totemAudio) { totemAudio.pause(); totemAudio.currentTime = 0; }

      /* Torna alla prima immagine come anteprima */
      showImage(0);
      totemCounter.setAttribute('value', '▶  Clicca per avviare');
    }

    /* ── AVVIA timer scorrimento immagini ── */
    function startImageTimer() {
      clearInterval(slideTimer);
      slideTimer = setInterval(function () {
        currentSlide = (currentSlide + 1) % TOTEM_CONFIG.images.length;
        showImage(currentSlide);
        updateCounter();
      }, TOTEM_CONFIG.interval);
    }

    /* ── MOSTRA immagine per indice ── */
    function showImage(index) {
      totemScreen.setAttribute('material', 'shader', 'flat');
      totemScreen.setAttribute('material', 'src', TOTEM_CONFIG.images[index]);
    }

    /* ── AGGIORNA testo counter ── */
    function updateCounter() {
      var total = TOTEM_CONFIG.images.length;
      if (isVideoPhase) {
        totemCounter.setAttribute('value', '▶  Vista drone');
      } else {
        totemCounter.setAttribute('value', '❚❚  ' + (currentSlide + 1) + ' / ' + total);
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') stopTotem();
    });
  </script>
</body>
</html>
