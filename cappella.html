<script>
(function() {
  var ROOMS = {
    piazza:    { dot: [110, 165], fills: ['mm-piazza'] },
    esterno:   { dot: [64,  106], fills: ['mm-esterno'] },
    corridoio: { dot: [64,  64],  fills: ['mm-corridoio'] },
    pozzo:     { dot: [168, 64],  fills: ['mm-pozzo'] },
    cappella:  { dot: [160, 133], fills: ['mm-cappella'] },
    loggia:    { dot: [199, 23],  fills: ['mm-loggia'] },
  };
  var NEUTRAL_FILL   = '#2a2010';
  var NEUTRAL_STROKE = '#5a4820';
  var NEUTRAL_TEXT   = '#7a6840';
  var ACTIVE_FILL    = 'rgba(201,168,76,0.22)';
  var ACTIVE_STROKE  = '#c9a84c';
  var ACTIVE_TEXT    = '#e8cf85';
  var TEXT_IDS = {
    piazza:    ['mm-piazza-t'],
    esterno:   ['mm-esterno-t'],
    corridoio: ['mm-corridoio-t'],
    pozzo:     ['mm-pozzo-t1','mm-pozzo-t2'],
    cappella:  ['mm-cappella-t'],
    loggia:    ['mm-loggia-t1','mm-loggia-t2'],
  };
  function highlight(key) {
    Object.keys(ROOMS).forEach(function(k) {
      var el = document.getElementById('mm-' + k);
      if (!el) return;
      el.setAttribute('fill', NEUTRAL_FILL);
      el.setAttribute('stroke', NEUTRAL_STROKE);
      TEXT_IDS[k].forEach(function(tid) {
        var t = document.getElementById(tid);
        if (t) t.setAttribute('fill', NEUTRAL_TEXT);
      });
    });
    var el = document.getElementById('mm-' + key);
    if (el) { el.setAttribute('fill', ACTIVE_FILL); el.setAttribute('stroke', ACTIVE_STROKE); }
    TEXT_IDS[key].forEach(function(tid) {
      var t = document.getElementById(tid);
      if (t) t.setAttribute('fill', ACTIVE_TEXT);
    });
    var dot = document.getElementById('mm-dot');
    var pos = ROOMS[key].dot;
    dot.setAttribute('cx', pos[0]);
    dot.setAttribute('cy', pos[1]);
  }
  var hud = document.getElementById('minimap-hud');
  highlight(hud.getAttribute('data-current') || 'piazza');
})();
</script>

  <script>
    var SLIDES = {
      1: { paths: ['IMG/fotodettagli/4.jpg','IMG/fotodettagli/7.jpg','IMG/fotodettagli/11.jpg','IMG/fotodettagli/12.jpg','IMG/fotodettagli/13.jpg'], current: 0 },
      3: { paths: ['IMG/fotodettagli/5.jpg','IMG/fotodettagli/6.jpg'], current: 0 }
    };

    var currentAudio = null;
    var activeN = null;

    function stopAllAudio() {
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
      currentAudio = null;
      activeN = null;
    }

    /* ── toggleAudio: pattern identico a sala2, usato per sfera-2 ── */
    function toggleAudio(n) {
      var a = document.getElementById('audio-' + n);
      if (activeN === n) {
        stopAllAudio();
      } else {
        stopAllAudio();
        currentAudio = a;
        activeN = n;
        a.currentTime = 0;
        a.play().catch(function(e){ console.warn(e); });
        a.onended = function() { currentAudio = null; activeN = null; };
      }
    }

    function openPanel(n) {
      stopAllAudio();
      document.getElementById('sfera-' + n).setAttribute('visible', false);
      if (document.getElementById('label-bg-' + n))
        document.getElementById('label-bg-' + n).setAttribute('visible', false);
      if (document.getElementById('label-' + n))
        document.getElementById('label-' + n).setAttribute('visible', false);
      SLIDES[n].current = 0;
      updateSlide(n);
      document.getElementById('panel-' + n).setAttribute('visible', true);
      currentAudio = document.getElementById('audio-' + n);
      activeN = n;
      currentAudio.currentTime = 0;
      currentAudio.play().catch(function(e){ console.warn(e); });
      currentAudio.onended = function() { closePanel(n); };
    }

    function closePanel(n) {
      document.getElementById('panel-' + n).setAttribute('visible', false);
      document.getElementById('sfera-' + n).setAttribute('visible', true);
      if (document.getElementById('label-bg-' + n))
        document.getElementById('label-bg-' + n).setAttribute('visible', true);
      if (document.getElementById('label-' + n))
        document.getElementById('label-' + n).setAttribute('visible', true);
      stopAllAudio();
    }

    function changeSlide(n, dir) {
      var s = SLIDES[n];
      s.current = (s.current + dir + s.paths.length) % s.paths.length;
      updateSlide(n);
    }

    function updateSlide(n) {
      var s = SLIDES[n];
      document.getElementById('slide-' + n)
        .setAttribute('material', 'shader: flat; src: url(' + s.paths[s.current] + '); color: #ffffff');
      document.getElementById('counter-' + n)
        .setAttribute('value', (s.current + 1) + ' / ' + s.paths.length);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { closePanel(1); closePanel(3); stopAllAudio(); }
    });

    document.querySelector('a-scene').addEventListener('loaded', function () {

      // Sfere
      document.getElementById('sfera-1').addEventListener('click', function () { openPanel(1); });
      document.getElementById('sfera-2').addEventListener('click', function () { toggleAudio(2); });
      document.getElementById('sfera-3').addEventListener('click', function () { openPanel(3); });

      // Pannello 1: freccia sx, freccia dx, chiudi
      var p1 = document.getElementById('panel-1').querySelectorAll('a-plane.interactable');
      if (p1[0]) p1[0].addEventListener('click', function(e) { e.stopPropagation(); changeSlide(1, -1); });
      if (p1[1]) p1[1].addEventListener('click', function(e) { e.stopPropagation(); changeSlide(1,  1); });
      if (p1[2]) p1[2].addEventListener('click', function(e) { e.stopPropagation(); closePanel(1); });

      // Pannello 3: freccia sx, freccia dx, chiudi
      var p3 = document.getElementById('panel-3').querySelectorAll('a-plane.interactable');
      if (p3[0]) p3[0].addEventListener('click', function(e) { e.stopPropagation(); changeSlide(3, -1); });
      if (p3[1]) p3[1].addEventListener('click', function(e) { e.stopPropagation(); changeSlide(3,  1); });
      if (p3[2]) p3[2].addEventListener('click', function(e) { e.stopPropagation(); closePanel(3); });
    });
  </script>
</body>
</html>
